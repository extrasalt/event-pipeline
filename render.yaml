services:
  - type: web
    name: eventpipeline-store
    runtime: docker
    repo: https://github.com/extrasalt/event-pipeline
    dockerfilePath: ./ecommerce/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: TRACKER_API_URL
        value: https://eventpipeline-store-production.up.railway.app/track/events
      - key: TRACKER_SOURCE
        value: mohan-store
    healthCheckPath: /health
    autoDeploy: false
