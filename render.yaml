services:
  - type: web
    name: eventpipeline-store
    runtime: docker
    repo: https://github.com/extrasalt/event-pipeline
    dockerfilePath: ./ecommerce/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health
    autoDeploy: false
